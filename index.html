<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OOP Midterm Portfolio</title> <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"> <style>
    :root{
      --bg:#fef6f9;
      --card:#fff;
      --accent:#ffd6e0;
      --text:#444;
      --soft:#f9f9f9;
    }

    *{box-sizing:border-box;}

    body{
      margin:0;
      font-family:'Poppins',sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    header{
      text-align:center;
      padding:35px 15px 10px;
    }

    header h1{
      margin:0;
      font-size:26px;
      font-weight:600;
    }

    header p{
      margin:5px 0 0;
      font-size:14px;
      opacity:.7;
    }

    .top-actions{
      display:flex;
      justify-content:center;
      gap:10px;
      margin-top:10px;
      flex-wrap:wrap;
    }

    .btn{
      padding:10px 14px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      background:#fff;
      box-shadow:0 4px 10px rgba(0,0,0,.08);
      font-family:'Poppins',sans-serif;
      font-size:13px;
    }

    .btn:hover{
      border:2px solid var(--accent);
    }

    .container{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
      gap:15px;
      padding:20px;
      max-width:700px;
      margin:auto;
    }

    .card{
      background:var(--card);
      padding:18px;
      border-radius:18px;
      text-align:center;
      cursor:pointer;
      box-shadow:0 4px 10px rgba(0,0,0,.08);
      transition:.2s;
    }

    .card:hover{
      transform:translateY(-5px);
      border:2px solid var(--accent);
    }

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.5);
      justify-content:center;
      align-items:center;
      padding:10px;
      z-index:1000;
    }

    .modal-content{
      background:#fff;
      padding:20px;
      border-radius:18px;
      width:100%;
      max-width:520px;
      max-height:90vh;
      overflow-y:auto;
    }

    .close{float:right;cursor:pointer;font-weight:bold;}

    .item{
      background:var(--soft);
      padding:12px;
      margin:10px 0;
      border-radius:12px;
      cursor:pointer;
    }

    .img-box img{
      width:100%;
      border-radius:12px;
      margin-top:8px;
      cursor:pointer;
    }

    .reflection{
      margin-top:12px;
      padding:12px;
      background:#fff7fa;
      border-left:4px solid var(--accent);
      border-radius:10px;
      font-size:14px;
      line-height:1.5;
    }

    .back{margin-top:10px;display:inline-block;cursor:pointer;opacity:.7;}

    .sub-title{margin-top:10px;font-weight:600;}

    .img-modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.85);
      justify-content:center;
      align-items:center;
      z-index:2000;
    }

    .img-modal img{
      max-width:90%;
      max-height:90%;
      border-radius:10px;
    }

  </style></head>
<body><header>
  <h1>OOP Midterm Portfolio</h1>
  <p>Object-Oriented Programming E-Portfolio</p>  <div class="top-actions">
    <button class="btn" onclick="openAbout()">About This Portfolio</button>
  </div>
</header><div class="container">
  <div class="card" onclick="openCategory('quiz')">Quiz</div>
  <div class="card" onclick="openCategory('assignment')">Assignments</div>
  <div class="card" onclick="openCategory('seatwork')">Seatwork</div>
  <div class="card" onclick="openCategory('activity')">Activity</div>
</div><div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">×</span>
    <div id="modalBody"></div>
  </div>
</div><div id="imgModal" class="img-modal" onclick="closeImg()">
  <img id="imgPreview">
</div><script>

function openAbout(){
  document.getElementById('modalBody').innerHTML = `

}

    { title:"Introduction to Java", images:["images/assignment2_1.jpg","images/assignment2_2.jpg"], reflection:"This activity helped me understand what happens behind the code, especially how Java runs through the JVM and JRE. It made me appreciate the language more because I now know it’s not just about writing code, but also how it is executed and managed by the system." }

    title:"Operators",
   subs:[
  {
    name:"Bitwise Operator",

  },

};

let current;

function openCategory(c){
  current=c;
  let html=`<h3>${c.toUpperCase()}</h3>`;
  data[c].forEach((x,i)=>{
    html+=`<div class='item' onclick='openItem(${i})'>${x.title}</div>`;
  });
  document.getElementById('modalBody').innerHTML=html;
  document.getElementById('modal').style.display='flex';
}


function openItem(i){
  const item=data[current][i];
  let html=`<h3>${item.title}</h3>`;

  // IF has sub-items
  if(item.subs){
    item.subs.forEach((s,si)=>{
      html+=`<div class='item' onclick='openSub(${i},${si})'>${s.name}</div>`;
    });

    // reflection for items WITH subs
    html+=`<div class='reflection'><b>Reflection:</b><br>${item.reflection}</div>`;
  } 
  else {
    if(item.images){
      item.images.forEach(img=>{
        html+=`<div class='img-box'><img src='${img}' onclick="openImg('${img}')"></div>`;
      });
    }

    // reflection for normal items
    html+=`<div class='reflection'><b>Reflection:</b><br>${item.reflection}</div>`;
  }

  html+=`<div class='back' onclick="openCategory('${current}')">← Back</div>`;

  document.getElementById('modalBody').innerHTML=html;
}

function openImg(src){
  document.getElementById('imgModal').style.display='flex';
  document.getElementById('imgPreview').src=src;
}

function closeImg(){
  document.getElementById('imgModal').style.display='none';
}

function closeModal(){
  document.getElementById('modal').style.display='none';
}

function openSub(i,si){
  const item=data[current][i];
  const sub=item.subs[si];

  let html=`<h3>${item.title} - ${sub.name}</h3>`;

  if(sub.code.length){
    html+=`<div class='sub-title'>Code</div>`;
    sub.code.forEach(c=>{
      html+=`<div class='img-box'><img src='${c}' onclick="openImg('${c}')"></div>`;
    });
  }

  if(sub.output.length){
    html+=`<div class='sub-title'>Sample Output</div>`;
    sub.output.forEach(o=>{
      html+=`<div class='img-box'><img src='${o}' onclick="openImg('${o}')"></div>`;
    });
  }

  html+=`<div class='reflection'><b>Reflection:</b><br>${item.reflection}</div>`;
  html+=`<div class='back' onclick="openItem(${i})">← Back</div>`;

  document.getElementById('modalBody').innerHTML=html;
}
</script></body>
</html>
